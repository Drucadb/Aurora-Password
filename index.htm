<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Aurora Password | Recovery System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 30% 10%, #0a0c15, #010101);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.5rem;
            position: relative;
        }

        /* Efeito de partículas sutis */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                radial-gradient(circle at 20% 40%, rgba(0, 162, 255, 0.03) 1px, transparent 1px),
                radial-gradient(circle at 80% 70%, rgba(0, 162, 255, 0.02) 1px, transparent 1px);
            background-size: 50px 50px, 80px 80px;
            pointer-events: none;
        }

        /* Animações */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        @keyframes glow {
            0% { box-shadow: 0 0 5px rgba(0, 162, 255, 0.3); }
            100% { box-shadow: 0 0 20px rgba(0, 162, 255, 0.6); }
        }

        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.05); }
        }

        .glass-panel {
            max-width: 620px;
            width: 100%;
            background: rgba(8, 12, 20, 0.75);
            backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            border: 1px solid rgba(0, 162, 255, 0.2);
            box-shadow: 0 30px 50px -20px rgba(0,0,0,0.6), 0 0 0 1px rgba(0, 162, 255, 0.1);
            transition: all 0.4s ease;
            overflow: hidden;
            position: relative;
        }

        .glass-panel::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 162, 255, 0.05), transparent);
            animation: shimmer 8s infinite;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            50% { left: 100%; }
            100% { left: 100%; }
        }

        .header {
            padding: 2rem 2rem 1rem 2rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            position: relative;
        }

        .logo {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 14px;
            margin-bottom: 0.8rem;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #00a2ff, #0055aa);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 20px rgba(0, 162, 255, 0.3);
            animation: float 3s ease-in-out infinite;
        }

        .logo-icon i {
            font-size: 1.8rem;
            color: white;
        }

        .logo h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFFFFF 0%, #00a2ff 80%, #4c9aff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.8px;
        }

        .sub {
            font-size: 0.85rem;
            color: #8e9aaf;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 8px;
        }

        .sub span {
            background: rgba(0,162,255,0.2);
            padding: 0.2rem 0.9rem;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 600;
            color: #5fc3ff;
            backdrop-filter: blur(4px);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(0,162,255,0.1);
            padding: 0.3rem 1rem;
            border-radius: 40px;
            font-size: 0.7rem;
            margin-top: 12px;
            color: #7e8aa8;
        }

        .content {
            padding: 2rem 2rem 1.5rem;
        }

        .search-area {
            background: rgba(0,0,0,0.4);
            border-radius: 1.5rem;
            padding: 0.25rem;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
        }

        .search-area:focus-within {
            border-color: rgba(0,162,255,0.5);
            box-shadow: 0 0 15px rgba(0,162,255,0.15);
        }

        .input-group {
            display: flex;
            gap: 0.8rem;
            background: #0b1018;
            border-radius: 1.2rem;
            padding: 0.3rem;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            color: #f0f3fa;
            font-weight: 500;
            outline: none;
            font-family: 'Inter', monospace;
        }

        .input-group input::placeholder {
            color: #4a5568;
            font-weight: 400;
        }

        .search-btn {
            background: linear-gradient(105deg, #0077cc, #00a2ff);
            border: none;
            padding: 0 2rem;
            border-radius: 1rem;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,162,255,0.25);
        }

        .search-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #0088ee, #1aacff);
            box-shadow: 0 8px 25px rgba(0,162,255,0.4);
        }

        .search-btn:active {
            transform: translateY(1px);
        }

        .loading-state {
            text-align: center;
            padding: 2rem;
            background: rgba(0,0,0,0.3);
            border-radius: 1.2rem;
            margin-top: 1.8rem;
        }

        .spinner {
            width: 45px;
            height: 45px;
            border: 3px solid rgba(0,162,255,0.2);
            border-top: 3px solid #00a2ff;
            border-right: 3px solid #00a2ff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px auto;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-text {
            color: #9aa9c1;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .loading-dots {
            display: inline-flex;
            gap: 3px;
        }

        .loading-dots span {
            width: 4px;
            height: 4px;
            background: #00a2ff;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1.2); opacity: 1; }
        }

        .error-card {
            margin-top: 1.8rem;
            animation: fadeSlideUp 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            background: linear-gradient(145deg, rgba(25, 20, 35, 0.9), rgba(12, 8, 18, 0.95));
            border-radius: 1.8rem;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(255, 90, 100, 0.3);
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .error-card::before {
            content: "";
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,70,85,0.03) 0%, transparent 70%);
            pointer-events: none;
        }

        @keyframes fadeSlideUp {
            from { opacity: 0; transform: translateY(25px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .error-icon {
            width: 85px;
            height: 85px;
            background: linear-gradient(135deg, rgba(255, 70, 85, 0.2), rgba(255, 100, 100, 0.1));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.2rem;
            border: 2px solid rgba(255, 90, 100, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        .error-icon i {
            font-size: 2.8rem;
            color: #ff7b7b;
        }

        .username-display {
            background: rgba(0,162,255,0.15);
            padding: 0.4rem 1rem;
            border-radius: 2rem;
            font-size: 0.85rem;
            color: #7bc5ff;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.2rem;
            font-weight: 500;
            backdrop-filter: blur(4px);
        }

        .error-title {
            font-size: 1.4rem;
            font-weight: 800;
            color: #ff8a8a;
            margin-bottom: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .error-message {
            color: #b8c4e0;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.2rem;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .patience-message {
            background: rgba(0, 162, 255, 0.08);
            padding: 1rem;
            border-radius: 1rem;
            margin: 1rem 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            border: 1px solid rgba(0, 162, 255, 0.2);
        }

        .patience-message i {
            font-size: 1.3rem;
            color: #ffaa44;
        }

        .patience-message span {
            color: #ffcc88;
            font-size: 0.85rem;
            font-weight: 500;
        }

        .error-code {
            background: rgba(0,0,0,0.6);
            padding: 0.6rem 1rem;
            border-radius: 0.8rem;
            font-family: monospace;
            font-size: 0.75rem;
            color: #ffaa66;
            margin: 1rem auto;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        .contact-btn {
            background: linear-gradient(95deg, #ff4757, #ff6b81);
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 3rem;
            font-weight: 700;
            color: white;
            font-size: 0.95rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            margin-top: 0.5rem;
            box-shadow: 0 8px 20px rgba(255, 70, 85, 0.3);
        }

        .contact-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.08);
            box-shadow: 0 12px 28px rgba(255, 70, 85, 0.45);
        }

        .support-info {
            margin-top: 1.2rem;
            font-size: 0.7rem;
            color: #6c7a91;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .support-info i {
            margin-right: 4px;
        }

        .footer-note {
            text-align: center;
            padding: 1rem 2rem 1.5rem;
            font-size: 0.7rem;
            color: #4a5568;
            border-top: 1px solid rgba(255,255,255,0.03);
            background: rgba(0,0,0,0.2);
        }

        .hidden {
            display: none;
        }

        /* Efeito de brilho nos campos */
        .glow-text {
            color: #00a2ff;
        }
    </style>
</head>
<body>

<div class="glass-panel">
    <div class="header">
        <div class="logo">
            <div class="logo-icon">
                <i class="fas fa-key"></i>
            </div>
            <h1>Aurora Password</h1>
        </div>
        <div class="sub">
            <i class="fas fa-shield-hooded"></i> Recovery System • Enterprise Security
            <span>v4.2</span>
        </div>
        <div class="status-badge">
            <i class="fas fa-circle" style="color: #2ecc71; font-size: 0.5rem;"></i>
            Sistema Online • Proteção Ativa
        </div>
    </div>

    <div class="content">
        <div class="search-area">
            <div class="input-group">
                <input type="text" id="target-user" placeholder="Digite o nickname do Roblox..." autocomplete="off">
                <button class="search-btn" id="searchBtn"><i class="fas fa-search"></i> Verificar</button>
            </div>
        </div>

        <div id="loadingPanel" class="loading-state hidden">
            <div class="spinner"></div>
            <div class="loading-text">
                <i class="fas fa-shield-alt"></i> Verificando credenciais de acesso
                <div class="loading-dots">
                    <span></span><span></span><span></span>
                </div>
            </div>
            <div style="font-size: 0.7rem; color: #5a6a85; margin-top: 10px;">Processo seguro • Aguarde um momento</div>
        </div>

        <div id="resultContainer" class="hidden"></div>
    </div>

    <div class="footer-note">
        <i class="fas fa-shield-virus"></i> Proteção contra acessos não autorizados
        <br><span style="font-size: 0.65rem;">Sistema de segurança Aurora • Tokens criptografados E2EE</span>
    </div>
</div>

<script>
    (function() {
        const searchInput = document.getElementById('target-user');
        const searchBtn = document.getElementById('searchBtn');
        const loadingPanel = document.getElementById('loadingPanel');
        const resultContainer = document.getElementById('resultContainer');

        let currentSearchedUser = '';

        function setLoading(show) {
            if(show) {
                loadingPanel.classList.remove('hidden');
                resultContainer.classList.add('hidden');
                resultContainer.innerHTML = '';
            } else {
                loadingPanel.classList.add('hidden');
            }
        }

        function escapeHtml(str) {
            if(!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if(m === '&') return '&amp;';
                if(m === '<') return '&lt;';
                if(m === '>') return '&gt;';
                return m;
            });
        }

        function showCookieError(username) {
            const displayName = username === '???' ? 'Usuário não especificado' : escapeHtml(username);
            
            const html = `
                <div class="error-card">
                    <div class="error-icon">
                        <i class="fas fa-cookie-bite"></i>
                    </div>
                    <div class="username-display">
                        <i class="fas fa-user-circle"></i> ${displayName}
                        <i class="fas fa-lock" style="font-size: 0.7rem; opacity: 0.7;"></i>
                    </div>
                    <div class="error-title">
                        <i class="fas fa-exclamation-triangle"></i> Cookie Inválido
                    </div>
                    <div class="error-message">
                        Você não enviou o cookie de autenticação correto para recuperar esta conta.<br>
                        O sistema de segurança Aurora detectou uma tentativa de acesso sem o token de verificação adequado.
                    </div>
                    
                    <div class="patience-message">
                        <i class="fas fa-hourglass-half"></i>
                        <span>⏳ Por favor, tenha paciência! O sistema está processando sua solicitação.</span>
                        <i class="fas fa-heart" style="color: #ff6b6b;"></i>
                    </div>
                    
                    <div class="error-code">
                        <i class="fas fa-code"></i> ERROR: AUTH_COOKIE_MISSING • #AURORA_0x7F3A
                    </div>
                    
                    <a href="https://www.tiktok.com/@sylles025" target="_blank" class="contact-btn">
                        <i class="fab fa-tiktok"></i> Contatar Suporte no TikTok
                    </a>
                    
                    <div class="support-info">
                        <span><i class="fas fa-clock"></i> Resposta em até 2 horas</span>
                        <span><i class="fas fa-headset"></i> Suporte 24/7</span>
                        <span><i class="fas fa-shield"></i> Atendimento prioritário</span>
                    </div>
                    
                    <div style="margin-top: 1rem; font-size: 0.65rem; color: #5a6a85; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 1rem;">
                        <i class="fas fa-info-circle"></i> Para agilizar o processo, envie o comprovante de propriedade da conta junto com seu ID de usuário.
                    </div>
                </div>
            `;
            
            resultContainer.innerHTML = html;
            resultContainer.classList.remove('hidden');
        }

        async function simulateVerification(username) {
            return new Promise((resolve) => {
                setTimeout(() => {
                    resolve();
                }, 2000);
            });
        }

        async function performSearch() {
            const rawUsername = searchInput.value.trim();
            
            setLoading(true);
            
            // Simula verificação com tempo um pouco maior para dar sensação de processo
            await simulateVerification(rawUsername);
            
            setLoading(false);
            
            if(!rawUsername) {
                showCookieError('???');
            } else {
                showCookieError(rawUsername);
            }
        }

        searchBtn.addEventListener('click', performSearch);
        searchInput.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                e.preventDefault();
                performSearch();
            }
        });

        console.log("✨ Aurora Password System | Modo de segurança ativo");
        console.log("🔒 Todos os acessos requerem cookie de autenticação válido");
        console.log("💙 Tenha paciência, estamos processando sua solicitação!");
    })();
</script>
</body>
</html>
